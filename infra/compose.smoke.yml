services:
  postgres:
    image: postgres@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - AUDIT_WRITE
      - MKNOD
      - NET_RAW
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /var/run/postgresql:rw,noexec,nosuid,nodev,size=16m
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${SMOKE_POSTGRES_PORT:?Smoke PostgreSQL port is required}:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: smoke_admin
      POSTGRES_PASSWORD: ${SMOKE_POSTGRES_PASSWORD:?Smoke PostgreSQL password is required}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username smoke_admin --dbname postgres"]
      interval: 2s
      timeout: 5s
      retries: 45
      start_period: 5s
    networks:
      - private
      - host-access

  gotrue:
    image: supabase/gotrue:v2.192.0@sha256:b252efb680be37d4a8bf77c210cf0439c19b63a4b51929233a65dd101d25bdab
    restart: "no"
    read_only: true
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 256m
    cpus: 1.0
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    ports:
      - "127.0.0.1:${SMOKE_GOTRUE_PORT:?Smoke GoTrue port is required}:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      PORT: "9999"
      API_EXTERNAL_URL: ${SMOKE_GOTRUE_ORIGIN:?Smoke GoTrue origin is required}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: ${SMOKE_GOTRUE_DATABASE_URL:?Smoke GoTrue database is required}
      GOTRUE_DB_NAMESPACE: auth
      GOTRUE_SITE_URL: ${SMOKE_APP_ORIGIN:?Smoke app origin is required}
      GOTRUE_URI_ALLOW_LIST: ${SMOKE_APP_ORIGIN:?Smoke app origin is required}/auth/confirm
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_EXTERNAL_EMAIL_MAGIC_LINK_ENABLED: "true"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: "false"
      GOTRUE_EXTERNAL_WEB3_ETHEREUM_ENABLED: "false"
      GOTRUE_EXTERNAL_WEB3_SOLANA_ENABLED: "false"
      GOTRUE_EXTERNAL_SAML_ENABLED: "false"
      GOTRUE_CUSTOM_OAUTH_ENABLED: "false"
      GOTRUE_OAUTH_SERVER_ENABLED: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_MAILER_OTP_EXP: "600"
      GOTRUE_MAILER_OTP_LENGTH: "6"
      GOTRUE_MAILER_ALLOW_UNVERIFIED_EMAIL_SIGN_INS: "false"
      GOTRUE_MAILER_SECURE_EMAIL_CHANGE_ENABLED: "true"
      GOTRUE_MAILER_URLPATHS_INVITE: /verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /verify
      GOTRUE_MAILER_URLPATHS_MAGIC_LINK: /verify
      GOTRUE_SMTP_HOST: mailpit
      GOTRUE_SMTP_PORT: "1025"
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_SMTP_ADMIN_EMAIL: auth@agency-workload.local
      GOTRUE_SMTP_SENDER_NAME: Agency Workload
      GOTRUE_JWT_SECRET: ${GOTRUE_JWT_SECRET:?GoTrue JWT secret is required}
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_SECURITY_REFRESH_TOKEN_ROTATION_ENABLED: "true"
      GOTRUE_SECURITY_REFRESH_TOKEN_REUSE_INTERVAL: "0"
      GOTRUE_SECURITY_MANUAL_LINKING_ENABLED: "false"
      GOTRUE_LOG_LEVEL: warn
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:9999/health"]
      interval: 2s
      timeout: 5s
      retries: 45
      start_period: 5s
    networks:
      - private
      - host-access

  mailpit:
    image: axllent/mailpit:v1.30.4@sha256:5a49a77c5bdbe7c5474450b4f46348d09949df3695257729c93a30369382d4f6
    restart: "no"
    read_only: true
    user: "65532:65532"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    ports:
      - "127.0.0.1:${SMOKE_SMTP_PORT:?Smoke SMTP port is required}:1025"
      - "127.0.0.1:${SMOKE_MAILPIT_PORT:?Smoke Mailpit port is required}:8025"
    environment:
      MP_DATABASE: /tmp/mailpit.db
      MP_DISABLE_VERSION_CHECK: "true"
      MP_UI_BIND_ADDR: 0.0.0.0:8025
      MP_SMTP_BIND_ADDR: 0.0.0.0:1025
      MP_MAX_MESSAGES: "50"
      MP_MAX_AGE: 1h
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 3s
    networks:
      - private
      - host-access

networks:
  private:
    driver: bridge
    attachable: false
    internal: true
  host-access:
    driver: bridge
    attachable: false

volumes:
  postgres-data:
